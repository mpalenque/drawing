<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; display: flex; height: 100vh; background: #000; }
    .wall-container { flex: 2; height: 100vh; border-right: 2px solid #333; }
    .tablet-container { flex: 1; height: 100vh; }
    iframe { border: none; width: 100%; height: 100%; }
    .header { position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 5px 10px; font-family: sans-serif; font-size: 12px; z-index: 10; border-radius: 0 0 10px 0; }
  </style>
</head>
<body>
  <div class="wall-container">
    <div class="header">Videowall (Server)</div>
    <iframe src="http://localhost:3000/videowall.html" id="videowall-frame"></iframe>
  </div>
  <div class="tablet-container">
    <div class="header" style="left: 66.66%;">Tablet 2 (Client)</div>
    <iframe src="http://localhost:3000/?tabletId=2" id="tablet-frame"></iframe>
  </div>
</body>
</html>
