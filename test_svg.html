<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      font-family: sans-serif;
    }
    .svg-container {
      background: white;
      width: 500px;
      height: 600px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
    }
    svg {
      width: 100%;
      height: 100%;
    }
    .styled path {
      fill: #ffffff !important;
      stroke: #000000 !important;
      stroke-width: 5px !important;
    }
  </style>
</head>
<body>
  <h2>Original SVG (Buzz Lightyear)</h2>
  <div class="svg-container" id="container1"></div>
  
  <h2>Styled SVG (Woody)</h2>
  <div class="svg-container styled" id="container2"></div>

  <script>
    fetch('/buzz_lightyear_clean.svg')
      .then(res => res.text())
      .then(text => {
        document.getElementById('container1').innerHTML = text;
      });

    fetch('/woody_clean.svg')
      .then(res => res.text())
      .then(text => {
        document.getElementById('container2').innerHTML = text;
      });
  </script>
</body>
</html>
